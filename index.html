<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ExamFlow</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f1117">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg: #0f1117;
            --card: #1a1d27;
            --border: #2a2d3a;
            --text: #e4e4e7;
            --muted: #71717a;
            --accent: #6366f1;
            --warning: #f59e0b;
            --danger: #ef4444;
            --success: #22c55e;
        }

        body {
            font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overscroll-behavior: none;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 1.5rem 1rem;
            padding-bottom: env(safe-area-inset-bottom, 1.5rem);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 1.8rem;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            flex-shrink: 0;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-name {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--text);
            line-height: 1.1;
        }

        .logo-highlight {
            background: linear-gradient(135deg, #6366f1, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-tagline {
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-top: 0.1rem;
        }

        /* Setup */
        .setup-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.2rem;
            margin-bottom: 1rem;
        }

        .setup-card h2 { font-size: 1rem; margin-bottom: 1rem; color: var(--muted); font-weight: 500; }

        input {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.6rem 0.8rem;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }
        input:focus { border-color: var(--accent); }

        .topic-row {
            display: flex;
            gap: 0.6rem;
            align-items: center;
            padding: 0.7rem;
            background: var(--bg);
            border-radius: 12px;
            margin-bottom: 0.5rem;
            border: 1px solid var(--border);
        }

        .topic-color {
            width: 14px; height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .topic-row input.topic-name {
            flex: 1;
            border: none;
            background: transparent;
            min-width: 0;
            padding: 0.5rem;
        }

        .minutes-control {
            display: flex;
            align-items: center;
            gap: 0;
            flex-shrink: 0;
        }

        .btn-pm {
            width: 36px;
            height: 36px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            -webkit-appearance: none;
            user-select: none;
        }

        .btn-pm:first-child { border-radius: 8px 0 0 8px; }
        .btn-pm:last-child { border-radius: 0 8px 8px 0; }

        .btn-pm:active { background: var(--accent); color: white; }

        .minutes-display {
            width: 40px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            user-select: none;
        }

        .minutes-label {
            font-size: 0.7rem;
            color: var(--muted);
            margin-left: 0.3rem;
            flex-shrink: 0;
        }

        .btn-remove {
            background: none; border: none; color: var(--muted);
            cursor: pointer; font-size: 1.1rem; padding: 0.4rem;
            border-radius: 6px; transition: all 0.2s;
            flex-shrink: 0;
        }
        .btn-remove:active { color: var(--danger); background: rgba(239,68,68,0.1); }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-appearance: none;
        }

        .btn-secondary {
            background: var(--bg);
            color: var(--text);
            border: 1px dashed var(--border);
        }
        .btn-secondary:active { border-color: var(--accent); color: var(--accent); }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #818cf8);
            color: white;
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
            margin-top: 1rem;
        }
        .btn-primary:active { transform: scale(0.98); }

        .total-time-display {
            text-align: center;
            padding: 0.7rem;
            background: var(--card);
            border-radius: 10px;
            margin-top: 0.8rem;
            font-size: 0.9rem;
            color: var(--muted);
            border: 1px solid var(--border);
        }
        .total-time-display span { color: var(--text); font-weight: 600; }

        /* Countdown Overlay */
        #countdownView {
            display: none;
            text-align: center;
            padding-top: 15vh;
        }

        .countdown-label {
            font-size: 1rem;
            color: var(--muted);
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .countdown-number {
            font-size: 8rem;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, #6366f1, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: countdownPop 1s ease-in-out infinite;
        }

        .countdown-hint {
            font-size: 0.85rem;
            color: var(--muted);
            margin-top: 2rem;
        }

        @keyframes countdownPop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.08); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Timer View */
        #timerView { display: none; }

        .timer-header {
            text-align: center;
            margin-bottom: 1.2rem;
        }

        .current-topic-label {
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.3rem;
        }

        .current-topic-name {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.2rem;
            transition: color 0.3s;
        }

        .current-topic-progress {
            font-size: 0.8rem;
            color: var(--muted);
        }

        /* Circular Timer */
        .timer-circle-container {
            display: flex;
            justify-content: center;
            margin: 1rem 0;
        }

        .timer-circle {
            width: 240px;
            height: 240px;
            position: relative;
        }

        .timer-circle svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .timer-circle .bg-ring {
            fill: none;
            stroke: var(--border);
            stroke-width: 8;
        }

        .timer-circle .progress-ring {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.3s ease, stroke 0.3s;
        }

        .timer-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .timer-display .time-remaining {
            font-size: 3rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
            line-height: 1;
        }

        .timer-display .time-label {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 0.2rem;
        }

        .timer-display .total-remaining {
            font-size: 0.9rem;
            color: var(--muted);
            margin-top: 0.6rem;
            font-variant-numeric: tabular-nums;
        }

        /* Timeline */
        .timeline {
            display: flex;
            border-radius: 8px;
            overflow: hidden;
            height: 40px;
            margin: 1rem 0;
        }

        .timeline-segment {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
            position: relative;
            overflow: hidden;
            transition: opacity 0.3s;
        }

        .timeline-segment.past { opacity: 0.35; }
        .timeline-segment.active { opacity: 1; }
        .timeline-segment.future { opacity: 0.6; }

        .timeline-segment .segment-fill {
            position: absolute;
            top: 0; left: 0; bottom: 0;
            background: rgba(0,0,0,0.35);
            transition: width 0.3s;
        }

        .timeline-segment span { position: relative; z-index: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 4px; }

        /* Topic List */
        .topic-list { margin: 1rem 0; }

        .topic-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem;
            border-radius: 10px;
            margin-bottom: 0.4rem;
            background: var(--card);
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .topic-item.active {
            border-color: currentColor;
            box-shadow: 0 0 15px rgba(99,102,241,0.1);
        }

        .topic-item.completed { opacity: 0.4; }

        .topic-item .topic-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .topic-item .topic-info { flex: 1; min-width: 0; }
        .topic-item .topic-title { font-weight: 600; font-size: 0.9rem; }
        .topic-item .topic-time { font-size: 0.75rem; color: var(--muted); font-variant-numeric: tabular-nums; }
        .topic-item .topic-duration { font-size: 0.8rem; color: var(--muted); font-variant-numeric: tabular-nums; flex-shrink: 0; }

        /* Controls */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
            margin: 1.2rem 0;
        }

        .btn-control {
            padding: 0.9rem 1rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            -webkit-appearance: none;
        }

        .btn-control:active { transform: scale(0.97); }

        .btn-start { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; }
        .btn-pause { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        .btn-reset { background: var(--card); color: var(--muted); border: 1px solid var(--border); }
        .btn-skip { background: var(--card); color: var(--accent); border: 1px solid var(--accent); }

        /* Warning state */
        .warning-active {
            animation: warningPulse 1s ease-in-out infinite;
        }

        @keyframes warningPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .warning-banner {
            display: none;
            text-align: center;
            padding: 0.7rem;
            background: rgba(245,158,11,0.15);
            border: 1px solid rgba(245,158,11,0.3);
            border-radius: 10px;
            color: var(--warning);
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
            animation: warningPulse 1s ease-in-out infinite;
        }

        .warning-banner.visible { display: block; }

        /* Finished */
        .finished-overlay {
            display: none;
            text-align: center;
            padding: 2rem 1rem;
        }

        .finished-overlay.visible { display: block; }
        .finished-overlay h2 { font-size: 1.6rem; margin-bottom: 0.8rem; color: var(--success); }
        .finished-overlay p { color: var(--muted); margin-bottom: 1.5rem; }

        /* Force portrait: show overlay when landscape */
        .landscape-block {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 1rem;
            text-align: center;
            padding: 2rem;
        }

        .landscape-block svg { width: 60px; height: 60px; }
        .landscape-block p { color: var(--muted); font-size: 1rem; }

        @media (orientation: landscape) and (max-height: 500px) {
            .landscape-block { display: flex; }
        }

        /* Mobile optimizations */
        @media (max-width: 400px) {
            .container { padding: 1rem 0.7rem; }
            .timer-circle { width: 200px; height: 200px; }
            .timer-display .time-remaining { font-size: 2.5rem; }
            .current-topic-name { font-size: 1.5rem; }
            .countdown-number { font-size: 6rem; }
            .topic-row { gap: 0.4rem; padding: 0.5rem; }
            .btn-pm { width: 32px; height: 32px; font-size: 1.1rem; }
            .minutes-display { width: 34px; height: 32px; font-size: 0.85rem; }
        }

        @media (min-height: 800px) {
            .timer-circle { width: 260px; height: 260px; }
            .timer-display .time-remaining { font-size: 3.2rem; }
        }
    </style>
</head>
<body>
    <div class="landscape-block">
        <svg viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round">
            <rect x="4" y="2" width="16" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18.01"/>
        </svg>
        <p>Bitte drehe dein Gerät<br>ins Hochformat</p>
    </div>
    <div class="container">
        <div class="logo">
            <svg class="logo-icon" viewBox="0 0 56 56" fill="none">
                <!-- outer ring -->
                <circle cx="28" cy="28" r="25" stroke="url(#logoGrad)" stroke-width="3.5" fill="none"/>
                <!-- tick marks -->
                <line x1="28" y1="5" x2="28" y2="9" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
                <line x1="28" y1="47" x2="28" y2="51" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
                <line x1="5" y1="28" x2="9" y2="28" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
                <line x1="47" y1="28" x2="51" y2="28" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
                <!-- minute hand -->
                <line x1="28" y1="28" x2="28" y2="12" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
                <!-- hour hand -->
                <line x1="28" y1="28" x2="38" y2="20" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
                <!-- center dot -->
                <circle cx="28" cy="28" r="2.5" fill="url(#logoGrad)"/>
                <!-- colored arc segments representing topics -->
                <path d="M28 6 A22 22 0 0 1 49 22" stroke="#ec4899" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
                <path d="M49 22 A22 22 0 0 1 44 44" stroke="#14b8a6" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
                <path d="M44 44 A22 22 0 0 1 28 50" stroke="#f59e0b" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
                <defs>
                    <linearGradient id="logoGrad" x1="0" y1="0" x2="56" y2="56">
                        <stop offset="0%" stop-color="#6366f1"/>
                        <stop offset="100%" stop-color="#a78bfa"/>
                    </linearGradient>
                </defs>
            </svg>
            <div class="logo-text">
                <span class="logo-name">Exam<span class="logo-highlight">Flow</span></span>
                <span class="logo-tagline">Dein Prüfungsbegleiter</span>
            </div>
        </div>

        <!-- Setup View -->
        <div id="setupView">
            <div class="setup-card">
                <h2>Fachgebiete</h2>
                <div id="topicList"></div>
                <button class="btn btn-secondary" onclick="addTopic()" style="width:100%; margin-top:0.5rem;">+ Fachgebiet hinzufügen</button>
            </div>

            <div class="total-time-display">
                Gesamtzeit: <span id="totalTimeDisplay">0 Min.</span>
            </div>

            <button class="btn btn-primary" onclick="startCountdown()">Timer starten</button>
        </div>

        <!-- Countdown View -->
        <div id="countdownView">
            <div class="countdown-label">Prüfung startet in</div>
            <div class="countdown-number" id="countdownNumber">5</div>
            <div class="countdown-hint">Mach dich bereit...</div>
        </div>

        <!-- Timer View -->
        <div id="timerView">
            <div class="warning-banner" id="warningBanner">Weniger als 15 Sekunden!</div>

            <div class="timer-header">
                <div class="current-topic-label">Aktuelles Fachgebiet</div>
                <div class="current-topic-name" id="currentTopicName">—</div>
                <div class="current-topic-progress" id="currentTopicProgress">Thema 1 von 3</div>
            </div>

            <div class="timer-circle-container">
                <div class="timer-circle">
                    <svg viewBox="0 0 280 280">
                        <circle class="bg-ring" cx="140" cy="140" r="124" />
                        <circle class="progress-ring" id="progressRing" cx="140" cy="140" r="124" />
                    </svg>
                    <div class="timer-display">
                        <div class="time-remaining" id="timeRemaining">00:00</div>
                        <div class="time-label">verbleibend</div>
                        <div class="total-remaining" id="totalRemaining">Gesamt: 00:00</div>
                    </div>
                </div>
            </div>

            <div class="timeline" id="timeline"></div>

            <div class="topic-list" id="topicListView"></div>

            <div class="controls" id="controls">
                <button class="btn-control btn-pause" id="btnPauseResume" onclick="togglePause()">Pause</button>
                <button class="btn-control btn-skip" onclick="skipTopic()">Überspringen</button>
                <button class="btn-control btn-reset" onclick="resetTimer()" style="grid-column: span 2;">Zurücksetzen</button>
            </div>

            <div class="finished-overlay" id="finishedOverlay">
                <h2>Prüfung beendet!</h2>
                <p id="finishedSummary">Alle Fachgebiete wurden behandelt.</p>
                <button class="btn btn-primary" onclick="resetTimer()" style="max-width:300px;margin:0 auto;display:block;">Neue Prüfung einrichten</button>
            </div>
        </div>
    </div>

    <script>
        const COLORS = [
            '#6366f1', '#ec4899', '#14b8a6', '#f59e0b', '#ef4444',
            '#8b5cf6', '#06b6d4', '#22c55e', '#f97316', '#3b82f6',
            '#e879f9', '#84cc16'
        ];

        let topics = [];
        let timerInterval = null;
        let currentTopicIndex = 0;
        let topicElapsed = 0;
        let totalElapsed = 0;
        let isPaused = false;
        let isRunning = false;
        let wakeLock = null;

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (e) { /* not supported or denied */ }
        }

        async function releaseWakeLock() {
            if (wakeLock) {
                await wakeLock.release();
                wakeLock = null;
            }
        }

        // Re-acquire wake lock when tab becomes visible again
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && isRunning && !isPaused) {
                requestWakeLock();
            }
        });

        function addTopic(name = '', minutes = 5) {
            const id = Date.now() + Math.random();
            topics.push({ id, name, minutes: Math.round(minutes) });
            renderSetup();
        }

        function removeTopic(id) {
            topics = topics.filter(t => t.id !== id);
            renderSetup();
        }

        function changeMinutes(id, delta) {
            const t = topics.find(t => t.id === id);
            if (t) {
                t.minutes = Math.max(1, t.minutes + delta);
                renderSetup();
            }
        }

        function updateTopicName(id, value) {
            const t = topics.find(t => t.id === id);
            if (t) t.name = value;
            // Don't re-render to keep cursor position
        }

        function updateTotalTime() {
            const total = topics.reduce((s, t) => s + t.minutes, 0);
            document.getElementById('totalTimeDisplay').textContent = `${total} Min.`;
        }

        function renderSetup() {
            const list = document.getElementById('topicList');
            list.innerHTML = topics.map((t, i) => `
                <div class="topic-row">
                    <div class="topic-color" style="background:${COLORS[i % COLORS.length]}"></div>
                    <input type="text" class="topic-name" placeholder="Fachgebiet-Name" value="${escapeHtml(t.name)}"
                        oninput="updateTopicName(${t.id}, this.value)">
                    <div class="minutes-control">
                        <button class="btn-pm" onclick="changeMinutes(${t.id}, -1)">−</button>
                        <div class="minutes-display">${t.minutes}</div>
                        <button class="btn-pm" onclick="changeMinutes(${t.id}, 1)">+</button>
                    </div>
                    <span class="minutes-label">Min.</span>
                    <button class="btn-remove" onclick="removeTopic(${t.id})">✕</button>
                </div>
            `).join('');
            updateTotalTime();
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Init with example topics
        addTopic('Fachgebiet 1', 5);
        addTopic('Fachgebiet 2', 5);
        addTopic('Fachgebiet 3', 5);

        function getTotalSeconds() {
            return topics.reduce((s, t) => s + t.minutes * 60, 0);
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        // 5-second countdown before timer starts
        function startCountdown() {
            if (topics.length === 0) return;
            topics.forEach(t => { if (!t.name.trim()) t.name = 'Ohne Titel'; });

            document.getElementById('setupView').style.display = 'none';
            document.getElementById('countdownView').style.display = 'block';

            let count = 5;
            const numEl = document.getElementById('countdownNumber');
            numEl.textContent = count;

            const cdInterval = setInterval(() => {
                count--;
                if (count <= 0) {
                    clearInterval(cdInterval);
                    document.getElementById('countdownView').style.display = 'none';
                    startTimer();
                } else {
                    numEl.textContent = count;
                }
            }, 1000);
        }

        function startTimer() {
            document.getElementById('timerView').style.display = 'block';

            currentTopicIndex = 0;
            topicElapsed = 0;
            totalElapsed = 0;
            isPaused = false;
            isRunning = true;

            renderTimeline();
            renderTopicList();
            updateDisplay();

            lastTick = Date.now();
            requestWakeLock();
            timerInterval = setInterval(tick, 100);
        }

        let lastTick = Date.now();

        function tick() {
            if (isPaused) { lastTick = Date.now(); return; }

            const now = Date.now();
            const delta = (now - lastTick) / 1000;
            lastTick = now;

            topicElapsed += delta;
            totalElapsed += delta;

            const currentTopic = topics[currentTopicIndex];
            const topicDuration = currentTopic.minutes * 60;

            if (topicElapsed >= topicDuration) {
                topicElapsed = topicElapsed - topicDuration;
                currentTopicIndex++;

                if (currentTopicIndex >= topics.length) {
                    finishTimer();
                    return;
                }
            }

            updateDisplay();
        }

        function updateDisplay() {
            const topic = topics[currentTopicIndex];
            const topicDuration = topic.minutes * 60;
            const topicRemaining = Math.max(0, topicDuration - topicElapsed);
            const totalTotal = getTotalSeconds();
            const totalRemaining = Math.max(0, totalTotal - totalElapsed);
            const color = COLORS[currentTopicIndex % COLORS.length];

            document.getElementById('currentTopicName').textContent = topic.name;
            document.getElementById('currentTopicName').style.color = color;
            document.getElementById('currentTopicProgress').textContent =
                `Thema ${currentTopicIndex + 1} von ${topics.length}`;

            document.getElementById('timeRemaining').textContent = formatTime(topicRemaining);
            document.getElementById('totalRemaining').textContent = `Gesamt: ${formatTime(totalRemaining)}`;

            const ring = document.getElementById('progressRing');
            const circumference = 2 * Math.PI * 124;
            const progress = topicElapsed / topicDuration;
            ring.style.strokeDasharray = circumference;
            ring.style.strokeDashoffset = circumference * (1 - progress);

            const isWarning = topicRemaining <= 15 && topicRemaining > 0;
            const banner = document.getElementById('warningBanner');

            if (isWarning) {
                ring.style.stroke = '#f59e0b';
                document.getElementById('timeRemaining').style.color = '#f59e0b';
                banner.classList.add('visible');
                document.getElementById('timeRemaining').classList.add('warning-active');
            } else {
                ring.style.stroke = color;
                document.getElementById('timeRemaining').style.color = '';
                banner.classList.remove('visible');
                document.getElementById('timeRemaining').classList.remove('warning-active');
            }

            updateTimeline();
            renderTopicList();
        }

        function renderTimeline() {
            const total = getTotalSeconds();
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = topics.map((t, i) => {
                const pct = (t.minutes * 60 / total) * 100;
                return `<div class="timeline-segment" id="seg-${i}"
                    style="width:${pct}%;background:${COLORS[i % COLORS.length]}">
                    <div class="segment-fill" id="segFill-${i}"></div>
                    <span>${t.name.length > 10 ? t.name.slice(0, 8) + '…' : t.name}</span>
                </div>`;
            }).join('');
        }

        function updateTimeline() {
            topics.forEach((t, i) => {
                const seg = document.getElementById(`seg-${i}`);
                const fill = document.getElementById(`segFill-${i}`);
                if (!seg || !fill) return;

                if (i < currentTopicIndex) {
                    seg.className = 'timeline-segment past';
                    fill.style.width = '100%';
                } else if (i === currentTopicIndex) {
                    seg.className = 'timeline-segment active';
                    const pct = (topicElapsed / (t.minutes * 60)) * 100;
                    fill.style.width = `${pct}%`;
                } else {
                    seg.className = 'timeline-segment future';
                    fill.style.width = '0%';
                }
            });
        }

        function renderTopicList() {
            const list = document.getElementById('topicListView');
            list.innerHTML = topics.map((t, i) => {
                const dur = t.minutes * 60;
                let status = '';
                let timeText = formatTime(dur);

                if (i < currentTopicIndex) {
                    status = 'completed';
                    timeText = 'Abgeschlossen';
                } else if (i === currentTopicIndex) {
                    status = 'active';
                    const rem = Math.max(0, dur - topicElapsed);
                    timeText = `${formatTime(rem)} verbleibend`;
                }

                return `<div class="topic-item ${status}" style="${status === 'active' ? `color:${COLORS[i % COLORS.length]}` : ''}">
                    <div class="topic-dot" style="background:${COLORS[i % COLORS.length]}"></div>
                    <div class="topic-info">
                        <div class="topic-title">${escapeHtml(t.name)}</div>
                        <div class="topic-time">${timeText}</div>
                    </div>
                    <div class="topic-duration">${t.minutes} Min.</div>
                </div>`;
            }).join('');
        }

        function togglePause() {
            isPaused = !isPaused;
            const btn = document.getElementById('btnPauseResume');
            if (isPaused) {
                btn.textContent = 'Weiter';
                btn.className = 'btn-control btn-start';
                releaseWakeLock();
            } else {
                btn.textContent = 'Pause';
                btn.className = 'btn-control btn-pause';
                lastTick = Date.now();
                requestWakeLock();
            }
        }

        function skipTopic() {
            const currentDuration = topics[currentTopicIndex].minutes * 60;
            const remaining = currentDuration - topicElapsed;
            totalElapsed += remaining;
            topicElapsed = 0;
            currentTopicIndex++;

            if (currentTopicIndex >= topics.length) {
                finishTimer();
                return;
            }

            lastTick = Date.now();
            updateDisplay();
        }

        function finishTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            releaseWakeLock();
            document.getElementById('controls').style.display = 'none';
            document.getElementById('warningBanner').classList.remove('visible');

            const overlay = document.getElementById('finishedOverlay');
            overlay.classList.add('visible');
            overlay.querySelector('#finishedSummary').textContent =
                `Alle ${topics.length} Fachgebiete wurden in ${formatTime(getTotalSeconds())} behandelt.`;

            topics.forEach((_, i) => {
                const seg = document.getElementById(`seg-${i}`);
                const fill = document.getElementById(`segFill-${i}`);
                if (seg) seg.className = 'timeline-segment past';
                if (fill) fill.style.width = '100%';
            });
            renderTopicList();
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            releaseWakeLock();
            isPaused = false;

            document.getElementById('setupView').style.display = 'block';
            document.getElementById('timerView').style.display = 'none';
            document.getElementById('countdownView').style.display = 'none';
            document.getElementById('controls').style.display = 'grid';
            document.getElementById('finishedOverlay').classList.remove('visible');
            document.getElementById('warningBanner').classList.remove('visible');

            renderSetup();
        }

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // Lock orientation to portrait
        if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('portrait').catch(() => {});
        }
    </script>
</body>
</html>
